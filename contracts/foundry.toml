[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "@sablier/v2-core/=lib/sablier-v2-core/",
  "@sablier/evm-utils/=lib/sablier-v2-core/utils/",
  "@prb/math/=lib/prb-math/",
  "@chainlink/contracts/=lib/chainlink-brownie-contracts/contracts/",
  "forge-std/=lib/forge-std/src/",
]

optimizer = true
optimizer_runs = 200

# Configuration for Arbitrum Sepolia testnet
[profile.arbitrum-sepolia]
solc_version = "0.8.27"

# Configuration for Arbitrum One mainnet
[profile.arbitrum-one]
solc_version = "0.8.27"

# Configuration for Robinhood Chain (Arbitrum Orbit L3)
[profile.robinhood-chain]
solc_version = "0.8.27"
