[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
remappings = [
  "@openzeppelin/=lib/openzeppelin-contracts/contracts/",
  "@sablier/=lib/sablier-v2-core/src/",
]

[profile.default.optimizer]
enabled = true
runs = 200

# Configuration for Arbitrum Sepolia testnet
[profile.arbitrum-sepolia]
solc_version = "0.8.27"

# Configuration for Arbitrum One mainnet
[profile.arbitrum-one]
solc_version = "0.8.27"

# Configuration for Robinhood Chain (Arbitrum Orbit L3)
[profile.robinhood-chain]
solc_version = "0.8.27"
